services:
  - type: web
    name: finanze-personali
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FINANZE_APP_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false